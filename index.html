<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civ5-Look Renderer — Unciv save viewer</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b1626; }
      #app { width: 100%; height: 100%; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        color: #e8e2ce; font-family: Georgia, serif;
        background: rgba(12, 22, 38, 0.82); border: 1px solid #3a4a62;
        border-radius: 8px; padding: 10px 14px; max-width: 300px;
      }
      #hud h1 { font-size: 16px; margin: 0 0 4px; color: #f3d789; }
      #hud .sub { font-size: 12px; opacity: 0.85; }
      #hud .controls { font-size: 11px; opacity: 0.65; margin-top: 6px; }
      #legend {
        margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr;
        gap: 2px 10px; font-size: 12px;
      }
      #legend .sw {
        display: inline-block; width: 10px; height: 10px; border-radius: 2px;
        margin-right: 5px; vertical-align: baseline;
      }
      #load {
        position: fixed; bottom: 12px; left: 12px; z-index: 10;
        color: #b8c4d8; font-family: Georgia, serif; font-size: 12px;
        background: rgba(12, 22, 38, 0.82); border: 1px solid #3a4a62;
        border-radius: 8px; padding: 8px 12px;
      }
      #status {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #f3d789; font-family: Georgia, serif; font-size: 20px; z-index: 5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app" data-render-state="loading"></div>
    <div id="status">Loading save…</div>
    <div id="hud" hidden>
      <h1 id="hud-title"></h1>
      <div class="sub" id="hud-sub"></div>
      <div id="legend"></div>
      <div class="controls">drag: pan · wheel: zoom · right-drag: tilt</div>
    </div>
    <div id="load">
      <label>Load your own save: <input type="file" id="file-input" /></label>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
