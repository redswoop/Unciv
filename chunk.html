<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civ5 tiles — chunk / gallery</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #1a2838; }
      #app { width: 100%; height: 100%; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        color: #e8e2ce; font-family: Georgia, serif;
        background: rgba(12, 22, 38, 0.9); border: 1px solid #3a4a62;
        border-radius: 8px; padding: 12px 16px; max-width: 380px;
      }
      #hud h1 { font-size: 15px; margin: 0 0 4px; color: #f3d789; }
      #hud .sub { font-size: 12px; opacity: 0.85; margin: 0 0 0; }
      #hud .muted { font-size: 11px; opacity: 0.55; margin-top: 8px; }
      #status {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #f3d789; font-family: Georgia, serif; font-size: 18px; z-index: 5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app" data-render-state="loading"></div>
    <div id="status">Loading…</div>
    <div id="hud">
      <h1 id="hud-title">Civ5 tiles</h1>
      <p class="sub" id="hud-sub"></p>
      <nav id="site-nav" aria-label="Views"></nav>
      <p class="muted">drag: pan · wheel: zoom · right-drag: tilt · assets from local Civ5 extract</p>
    </div>
    <script type="module" src="/src/chunk-main.ts"></script>
  </body>
</html>
