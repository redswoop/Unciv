<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Tile — Firaxis grassland hill</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #1a2838; }
      #app { width: 100%; height: 100%; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        color: #e8e2ce; font-family: Georgia, serif;
        background: rgba(12, 22, 38, 0.88); border: 1px solid #3a4a62;
        border-radius: 8px; padding: 12px 16px; max-width: 340px;
      }
      #hud h1 { font-size: 15px; margin: 0 0 6px; color: #f3d789; }
      #hud p { font-size: 12px; opacity: 0.85; margin: 0 0 4px; line-height: 1.4; }
      #hud .muted { opacity: 0.55; font-size: 11px; margin-top: 8px; }
      #status {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #f3d789; font-family: Georgia, serif; font-size: 18px; z-index: 5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app" data-render-state="loading"></div>
    <div id="status">Loading Firaxis tile assets…</div>
    <div id="hud">
      <h1>Hero tile — Grass Hill</h1>
      <p>Real Civ5 assets: <code>euro_grassland_d</code> digimap + piece heightmap + forest billboards.</p>
      <p>Goal: one hex as close as we can get to the Firaxis reference.</p>
      <p class="muted">drag: pan · wheel: zoom · right-drag: tilt · <a href="/" style="color:#9cf">full map</a></p>
    </div>
    <script type="module" src="/src/hero-main.ts"></script>
  </body>
</html>
